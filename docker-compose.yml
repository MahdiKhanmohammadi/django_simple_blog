services:
  redis:
    image: redis
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]

  web:
    build: .
    container_name: django_blog
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - DEBUG=True
      - SECRET_KEY="SECRET_KEY"
      - ALLOWED_HOST="http://127.0.0.1/,localhost"

  worker:
    build: .
    container_name: worker_django_blog
    command: celery -A config worker -l INFO
    volumes:
      - .:/app
    depends_on:
      - redis
      - web
    environment:
      - DEBUG=True
      - SECRET_KEY="SECRET_KEY"
      - ALLOWED_HOST="http://127.0.0.1/,localhost"
